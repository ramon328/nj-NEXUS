<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Seguimiento de Cobranza · Nexus</title>
<style>
  :root{
    --bg:#0b0f14; --panel:#131a23; --panel2:#0f151d; --line:#223041;
    --txt:#e7eef6; --dim:#8ba0b5; --acc:#3ea6ff;
    --ok:#25c26e; --wait:#e0a422; --err:#ef4d5a; --deliv:#12b5b0;
  }
  @media (prefers-color-scheme:light){
    :root{ --bg:#f2f5f9; --panel:#ffffff; --panel2:#f7fafd; --line:#dde5ef;
      --txt:#132030; --dim:#5a6b7d; --acc:#1668c9; }
  }
  *{box-sizing:border-box}
  body{margin:0;font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased}
  header{padding:22px 20px 10px;display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  h1{font-size:20px;margin:0;font-weight:700;letter-spacing:.2px}
  .sub{color:var(--dim);font-size:13px}
  .wrap{max-width:1000px;margin:0 auto;padding:0 16px 60px}
  .grid{display:grid;gap:16px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .chead{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--line);gap:10px;flex-wrap:wrap}
  .name{font-weight:700;font-size:17px}
  .num{color:var(--dim);font-size:13px;font-variant-numeric:tabular-nums}
  .kpis{display:flex;gap:8px;flex-wrap:wrap}
  .kpi{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:6px 10px;text-align:center;min-width:62px}
  .kpi b{display:block;font-size:17px;line-height:1.1}
  .kpi span{font-size:10.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.4px}
  .body{padding:6px 16px 16px}
  .chan{margin-top:12px}
  .chan h3{font-size:13px;margin:8px 0 6px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:7px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  td,th{padding:6px 8px;text-align:left;border-bottom:1px solid var(--line)}
  th{color:var(--dim);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.4px}
  tr:last-child td{border-bottom:none}
  .tnum{font-variant-numeric:tabular-nums;white-space:nowrap}
  .badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11.5px;font-weight:600}
  .b-ok{background:color-mix(in srgb,var(--ok) 20%,transparent);color:var(--ok)}
  .b-wait{background:color-mix(in srgb,var(--wait) 20%,transparent);color:var(--wait)}
  .b-err{background:color-mix(in srgb,var(--err) 22%,transparent);color:var(--err)}
  .b-deliv{background:color-mix(in srgb,var(--deliv) 20%,transparent);color:var(--deliv)}
  .pill{font-size:11px;padding:1px 7px;border-radius:6px;background:var(--panel2);border:1px solid var(--line);color:var(--dim)}
  .foot{color:var(--dim);font-size:12px;margin-top:18px;text-align:center}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--ok);margin-right:6px;vertical-align:middle}
  .msg{color:var(--dim);font-size:12.5px;margin:2px 0 0}
  a{color:var(--acc)}
</style>
</head>
<body>
<header class="wrap">
  <h1>📮 Seguimiento de Cobranza</h1>
  <span class="sub" id="sub">cargando…</span>
</header>
<div class="wrap">
  <div class="grid" id="grid"></div>
  <div class="foot"><span class="dot"></span>Actualiza solo cada 15 s · panel de solo lectura · datos de Nexus</div>
</div>

<script>
const $ = (s)=>document.querySelector(s)
const fmt = (iso)=>{ if(!iso) return '—'; const d=new Date(iso);
  return d.toLocaleString('es-CL',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) }
function estBadge(e){
  const m={enviado:'b-ok',pendiente:'b-wait',error:'b-err',entregado:'b-deliv',recibido:'b-deliv'}
  return `<span class="badge ${m[e]||'pill'}">${e||'—'}</span>`
}
function canalTabla(nombre,icono,c){
  if(!c.total) return ''
  const rows = c.programados.map(p=>`<tr>
      <td class="tnum">${fmt(p.cuando)}</td>
      <td>${estBadge(p.estado)}</td>
      <td class="msg">${(p.resultado||'').replace(/</g,'&lt;')||'—'}</td>
    </tr>`).join('')
  return `<div class="chan">
    <h3>${icono} ${nombre} · <span class="pill">${c.enviados} enviados</span> <span class="pill">${c.pendientes} próximos</span>${c.errores?` <span class="badge b-err">${c.errores} error</span>`:''}</h3>
    <table><thead><tr><th>Cuándo</th><th>Estado</th><th>Resultado</th></tr></thead><tbody>${rows}</tbody></table>
  </div>`
}
function card(ct){
  const r=ct.resumen
  return `<div class="card">
    <div class="chead">
      <div><div class="name">${ct.nombre}</div><div class="num">${ct.num}</div></div>
      <div class="kpis">
        <div class="kpi"><b>${r.enviados}</b><span>enviados</span></div>
        <div class="kpi"><b>${r.entregados}</b><span>entregados</span></div>
        <div class="kpi"><b>${r.pendientes}</b><span>próximos</span></div>
        <div class="kpi"><b style="color:${r.errores?'var(--err)':'inherit'}">${r.errores}</b><span>errores</span></div>
      </div>
    </div>
    <div class="body">
      <div class="msg">Próximo envío: <b>${fmt(r.proximo)}</b></div>
      ${canalTabla('SMS','📱',ct.canales.sms)}
      ${canalTabla('WhatsApp','💬',ct.canales.whatsapp)}
    </div>
  </div>`
}
async function tick(){
  try{
    const d = await (await fetch('/api/seguimiento',{cache:'no-store'})).json()
    $('#grid').innerHTML = d.contactos.map(card).join('')
    $('#sub').textContent = `${d.contactos.length} números · actualizado ${fmt(d.generado)}`
  }catch(e){ $('#sub').textContent = 'error al actualizar: '+e.message }
}
tick(); setInterval(tick, 15000)
</script>
</body>
</html>
